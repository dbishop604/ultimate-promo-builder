<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Ultimate Promo Builder — Access</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Condensed:wght@700;800&family=Bebas+Neue&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;padding:24px;background:#0c0c0e;color:#f0edf8;font-family:Barlow,Arial,sans-serif}.wrap{width:min(560px,100%)}.brand{font:26px/1 Bebas Neue,sans-serif;letter-spacing:.06em}.brand span{color:#c4922a}.card{margin-top:18px;padding:34px;border:1px solid rgba(255,255,255,.12);border-radius:18px;background:#141416;box-shadow:0 30px 90px rgba(0,0,0,.55)}.kicker{color:#d8a947;font:800 12px Barlow Condensed,sans-serif;letter-spacing:.18em;text-transform:uppercase}h1{margin:8px 0 10px;font:54px/.92 Bebas Neue,sans-serif;letter-spacing:.02em}p{margin:0;color:#aba9bb;line-height:1.55}.field{margin-top:24px}label{display:block;margin-bottom:7px;font-weight:700}input{width:100%;height:48px;padding:0 14px;border:1px solid rgba(255,255,255,.18);border-radius:10px;background:#0c0c0e;color:#fff;font:16px Barlow,sans-serif;outline:none}input:focus{border-color:#c4922a;box-shadow:0 0 0 3px rgba(196,146,42,.14)}button{width:100%;margin-top:12px;padding:14px 18px;border:0;border-radius:999px;background:#c4922a;color:#080708;font:800 16px Barlow Condensed,sans-serif;letter-spacing:.1em;text-transform:uppercase;cursor:pointer}button:hover{background:#d8a947}button:disabled{opacity:.65;cursor:wait}.message{min-height:22px;margin-top:12px;color:#ff786f;font-size:14px}.help{margin-top:20px;padding-top:18px;border-top:1px solid rgba(255,255,255,.09);font-size:13px}.help a{color:#d8a947}.fine{margin-top:16px;font-size:12px;color:#73717f}
  </style>
</head>
<body>
  <main class="wrap">
    <div class="brand">ULTIMATE <span>PROMO</span> BUILDER</div>
    <section class="card">
      <div class="kicker">EmpowerTools</div>
      <h1>Unlock Your Builder</h1>
      <p>Paste the license key from your Gumroad receipt. You only need to do this once on this browser.</p>
      <form id="accessForm">
        <div class="field"><label for="licenseKey">Gumroad license key</label><input id="licenseKey" name="licenseKey" autocomplete="off" required></div>
        <button id="submitButton" type="submit">Open the Builder</button>
        <div class="message" id="message" role="alert"></div>
      </form>
      <p class="help">Need help finding your purchase? <a href="https://gumroad.com/library" target="_blank" rel="noopener">Open your Gumroad Library</a>.</p>
      <p class="fine">© 2026 Angelgate LLC · EmpowerTools</p>
    </section>
  </main>
  <script>
    const form=document.getElementById('accessForm'),button=document.getElementById('submitButton'),message=document.getElementById('message');
    form.addEventListener('submit',async e=>{e.preventDefault();message.textContent='';button.disabled=true;button.textContent='Checking license…';try{const response=await fetch('/api/access',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({licenseKey:form.licenseKey.value})});const data=await response.json();if(!response.ok)throw new Error(data.message||'The license could not be verified.');location.assign(data.redirect||'/app');}catch(error){message.textContent=error.message;}finally{button.disabled=false;button.textContent='Open the Builder';}});
  </script>
</body>
</html>
